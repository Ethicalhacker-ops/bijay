<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextEdge IT Services - Digital Solutions Provider | Web, Cloud & Software Development</title>
    <meta name="description" content="NextEdge IT Services provides cutting-edge technology solutions including web development, mobile apps, cloud services, and cybersecurity for businesses worldwide.">
    <meta name="keywords" content="IT services, web development, mobile apps, cloud solutions, cybersecurity, software development, digital transformation">
    <meta name="author" content="NextEdge IT Services">
    <meta property="og:title" content="NextEdge IT Services - Digital Solutions Provider">
    <meta property="og:description" content="Innovative IT solutions for your business growth. Web, mobile, cloud, and cybersecurity services.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.nextedgeit.com">
    <meta property="og:image" content="https://www.nextedgeit.com/images/social-preview.jpg">
    <link rel="canonical" href="https://www.nextedgeit.com">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --accent: #3b82f6;
            --dark: #1f2937;
            --light: #f9fafb;
            --bg-light: #f0f4f8;
            --bg-dark: #0f172a;
            --text-light: #333;
            --text-dark: #f8fafc;
            --card-bg-light: #ffffff;
            --card-bg-dark: #1e293b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        
        body {
            background-color: var(--bg-light);
            color: var(--text-light);
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        
        body.dark-mode {
            background-color: var(--bg-dark);
            color: var(--text-dark);
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop');
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }
        
        body.dark-mode::before {
            background-color: rgba(0, 0, 0, 0.85);
        }
        
        header {
            background-color: rgba(31, 41, 55, 0.9);
            color: white;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body.dark-mode header {
            background-color: rgba(15, 23, 42, 0.9);
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        
        .logo span {
            color: var(--accent);
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            padding: 0.5rem 0;
            position: relative;
        }
        
        nav a:hover {
            color: var(--accent);
        }
        
        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent);
            transition: width 0.3s;
        }
        
        nav a:hover::after {
            width: 100%;
        }
        
        .header-utils {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .current-time {
            background-color: rgba(37, 99, 235, 0.8);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        
        .current-time img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .theme-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.3s;
        }
        
        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .hero {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 4rem 2rem;
            text-align: center;
            margin-bottom: 3rem;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            background-image: url('https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        
        body.dark-mode .hero {
            background-color: rgba(30, 41, 59, 0.9);
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(37, 99, 235, 0.7);
        }
        
        body.dark-mode .hero::before {
            background-color: rgba(15, 23, 42, 0.8);
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
            color: white;
        }
        
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: white;
        }
        
        .hero p {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto 2rem;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-outline {
            background-color: transparent;
            border: 2px solid white;
            margin-left: 1rem;
        }
        
        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .section {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 3rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        body.dark-mode .section {
            background-color: rgba(30, 41, 59, 0.9);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .section h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--dark);
            position: relative;
            padding-bottom: 0.5rem;
        }
        
        body.dark-mode .section h2 {
            color: var(--text-dark);
        }
        
        .section h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background-color: var(--primary);
        }
        
        .section p {
            color: #666;
        }
        
        body.dark-mode .section p {
            color: #cbd5e1;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .service-card {
            background-color: var(--card-bg-light);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        body.dark-mode .service-card {
            background-color: var(--card-bg-dark);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        body.dark-mode .service-card:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }
        
        .service-img {
            height: 180px;
            overflow: hidden;
        }
        
        .service-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .service-card:hover .service-img img {
            transform: scale(1.05);
        }
        
        .service-content {
            padding: 1.5rem;
        }
        
        .service-content h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }
        
        body.dark-mode .service-content h3 {
            color: var(--text-dark);
        }
        
        .service-content p {
            color: #666;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        
        body.dark-mode .service-content p {
            color: #cbd5e1;
        }
        
        .service-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: color 0.3s;
        }
        
        .service-link:hover {
            color: var(--secondary);
        }
        
        .service-link svg {
            margin-left: 0.3rem;
            transition: transform 0.3s;
        }
        
        .service-link:hover svg {
            transform: translateX(3px);
        }
        
        .why-choose-us {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .feature-card {
            background-color: var(--card-bg-light);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s;
        }
        
        body.dark-mode .feature-card {
            background-color: var(--card-bg-dark);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
        }
        
        .feature-card h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }
        
        .feature-card p {
            color: #666;
        }
        
        body.dark-mode .feature-card p {
            color: #cbd5e1;
        }
        
        /* Testimonials Section */
        .testimonials {
            margin: 3rem 0;
        }
        
        .testimonial-slider {
            position: relative;
            overflow: hidden;
            padding: 2rem 0;
        }
        
        .testimonial-track {
            display: flex;
            transition: transform 0.5s ease;
        }
        
        .testimonial-card {
            min-width: 100%;
            padding: 0 1rem;
            box-sizing: border-box;
        }
        
        .testimonial-content {
            background-color: var(--card-bg-light);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        body.dark-mode .testimonial-content {
            background-color: var(--card-bg-dark);
        }
        
        .testimonial-content::before {
            content: '"';
            font-size: 5rem;
            color: rgba(59, 130, 246, 0.1);
            position: absolute;
            top: 0;
            left: 1rem;
            line-height: 1;
        }
        
        .testimonial-text {
            font-style: italic;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }
        
        .testimonial-author {
            display: flex;
            align-items: center;
        }
        
        .author-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            margin-right: 1rem;
        }
        
        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .author-info h4 {
            margin-bottom: 0.2rem;
            color: var(--dark);
        }
        
        body.dark-mode .author-info h4 {
            color: var(--text-dark);
        }
        
        .author-info p {
            color: #666;
            font-size: 0.9rem;
        }
        
        body.dark-mode .author-info p {
            color: #cbd5e1;
        }
        
        .testimonial-nav {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
            gap: 0.5rem;
        }
        
        .testimonial-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #cbd5e1;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .testimonial-dot.active {
            background-color: var(--primary);
        }
        
        /* Clients Section */
        .clients-section {
            margin: 3rem 0;
        }
        
        .client-logos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .client-logo {
            filter: grayscale(100%);
            opacity: 0.7;
            transition: filter 0.3s, opacity 0.3s;
            max-width: 150px;
            max-height: 80px;
        }
        
        .client-logo:hover {
            filter: grayscale(0%);
            opacity: 1;
        }
        
        /* Team Section */
        .team-section {
            margin: 3rem 0;
        }
        
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .team-member {
            background-color: var(--card-bg-light);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        
        body.dark-mode .team-member {
            background-color: var(--card-bg-dark);
        }
        
        .team-member:hover {
            transform: translateY(-5px);
        }
        
        .member-photo {
            height: 250px;
            overflow: hidden;
        }
        
        .member-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .team-member:hover .member-photo img {
            transform: scale(1.05);
        }
        
        .member-info {
            padding: 1.5rem;
            text-align: center;
        }
        
        .member-info h3 {
            margin-bottom: 0.5rem;
            color: var(--dark);
        }
        
        body.dark-mode .member-info h3 {
            color: var(--text-dark);
        }
        
        .member-info p {
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 1rem;
        }
        
        .member-social {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        
        .member-social a {
            color: #666;
            transition: color 0.3s;
        }
        
        body.dark-mode .member-social a {
            color: #cbd5e1;
        }
        
        .member-social a:hover {
            color: var(--primary);
        }
        
        /* Newsletter Section */
        .newsletter-section {
            background-color: var(--primary);
            padding: 3rem 2rem;
            border-radius: 10px;
            color: white;
            text-align: center;
            margin: 3rem 0;
        }
        
        .newsletter-section h2 {
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }
        
        .newsletter-section h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background-color: white;
        }
        
        .newsletter-section p {
            max-width: 600px;
            margin: 0 auto 2rem;
            opacity: 0.9;
        }
        
        .newsletter-form {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .newsletter-form input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 50px 0 0 50px;
            font-size: 1rem;
        }
        
        .newsletter-form button {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 0 50px 50px 0;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .newsletter-form button:hover {
            background-color: #1e3a8a;
        }
        
        /* Contact Section */
        .contact-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 3rem 0;
        }
        
        .contact-info-card {
            background-color: var(--card-bg-light);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body.dark-mode .contact-info-card {
            background-color: var(--card-bg-dark);
        }
        
        .contact-info-card h3 {
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 0.5rem;
        }
        
        .contact-info-card h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 3px;
            background-color: var(--primary);
        }
        
        .contact-details {
            margin-bottom: 2rem;
        }
        
        .contact-detail {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .contact-detail svg {
            margin-right: 1rem;
            color: var(--primary);
            flex-shrink: 0;
        }
        
        .contact-detail a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        body.dark-mode .contact-detail a {
            color: #cbd5e1;
        }
        
        .contact-detail a:hover {
            color: var(--primary);
        }
        
        .contact-map {
            height: 300px;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .contact-map iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .contact-form {
            background-color: var(--card-bg-light);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body.dark-mode .contact-form {
            background-color: var(--card-bg-dark);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            background-color: var(--card-bg-light);
            color: var(--text-light);
        }
        
        body.dark-mode .form-group input,
        body.dark-mode .form-group textarea,
        body.dark-mode .form-group select {
            background-color: var(--bg-dark);
            color: var(--text-dark);
            border-color: #334155;
        }
        
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        .form-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .form-submit:hover {
            background-color: var(--secondary);
        }
        
        footer {
            background-color: rgba(31, 41, 55, 0.9);
            color: white;
            padding: 3rem 2rem 1.5rem;
            margin-top: 3rem;
        }
        
        body.dark-mode footer {
            background-color: rgba(15, 23, 42, 0.9);
        }
        
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }
        
        .footer-logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: block;
            color: white;
            text-decoration: none;
        }
        
        .footer-logo span {
            color: var(--accent);
        }
        
        .footer-about p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .footer-links h3, .footer-contact h3 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 0.5rem;
        }
        
        .footer-links h3::after, .footer-contact h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 2px;
            background-color: var(--accent);
        }
        
        .footer-links ul {
            list-style: none;
        }
        
        .footer-links li {
            margin-bottom: 0.8rem;
        }
        
        .footer-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.3s;
            display: inline-block;
        }
        
        .footer-links a:hover {
            color: var(--accent);
            transform: translateX(5px);
        }
        
        .contact-info {
            margin-bottom: 1.5rem;
        }
        
        .contact-info p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
        }
        
        .contact-info a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .contact-info a:hover {
            color: var(--accent);
        }
        
        .contact-info svg {
            margin-right: 0.8rem;
            color: var(--accent);
        }
        
        .social-links {
            display: flex;
            gap: 1rem;
        }
        
        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: white;
            transition: all 0.3s;
        }
        
        .social-links a:hover {
            background-color: var(--accent);
            transform: translateY(-3px);
        }
        
        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            margin-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 99;
        }
        
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .back-to-top:hover {
            background-color: var(--secondary);
            transform: translateY(-3px);
        }
        
        .marquee {
            background-color: rgba(37, 99, 235, 0.8);
            color: white;
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 90;
        }
        
        body.dark-mode .marquee {
            background-color: rgba(15, 23, 42, 0.9);
        }
        
        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        
        /* Floating Social Media */
        .floating-social {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 90;
        }
        
        .floating-social a {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .floating-social a:hover {
            background-color: var(--secondary);
            transform: translateY(-3px);
        }
        
        /* Cookie Consent */
        .cookie-consent {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--card-bg-light);
            color: var(--text-light);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            max-width: 90%;
            width: 600px;
            z-index: 1000;
            display: none;
        }
        
        body.dark-mode .cookie-consent {
            background-color: var(--card-bg-dark);
            color: var(--text-dark);
        }
        
        .cookie-consent.show {
            display: block;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
        
        .cookie-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .cookie-text {
            flex: 1;
        }
        
        .cookie-text p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .cookie-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
        
        .cookie-btn {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .cookie-accept {
            background-color: var(--primary);
            color: white;
            border: none;
        }
        
        .cookie-accept:hover {
            background-color: var(--secondary);
        }
        
        .cookie-decline {
            background-color: transparent;
            border: 1px solid #ddd;
            color: var(--text-light);
        }
        
        body.dark-mode .cookie-decline {
            border-color: #334155;
            color: var(--text-dark);
        }
        
        .cookie-decline:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        
        body.dark-mode .cookie-decline:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        /* Loading Animation */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            margin-top: 1rem;
            font-size: 1.2rem;
        }
        
        /* Animation Classes */
        .fade-in {
            animation: fadeIn 1s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .slide-up {
            animation: slideUp 0.8s ease;
        }

            .cookie-actions {
                justify-content: center;
            }
        }
